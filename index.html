<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedulerгғ•гӮЎгӮӨгғ«гӮўгғғгғ—гғӯгғјгғү</title>
    <link rel="icon" type="image/x-icon" href="https://wataru532.github.io/Scheduler/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="https://wataru532.github.io/Scheduler/artworks/apple-touch-icon-180x180.png">
</head>
<body>
    <section class="headsection">
        <a href="index.html"><img class="home-img1" src="https://wataru532.github.io/Scheduler/artworks/apple-touch-icon-180x180.png"></a>
        <p class="title">Scheduler</p>
        <hr class="line1">
    </section>
    <h2>Schedulerгғ•гӮЎгӮӨгғ«гӮўгғғгғ—гғӯгғјгғү</h2>
    <p class="text"><strong>гӮҜгғ©гӮ№дёҖиҰ§.csv</strong>гғ•гӮЎгӮӨгғ«гӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮгӮўгғғгғ—гғӯгғјгғүгҒҜиҮӘеӢ•гҒ§иЎҢгӮҸгӮҢгҒҫгҒҷгҖӮ</p>
    <input type="file" id="csvFile" accept=".csv" class="filebutton"/>

    <style>
        body {
            margin: 0;
        }
        .title{
            margin-left: 0.625rem;
            font-size: 30px;
            font-family:"Google Sans","roboto","helvetica";
            font-weight: 400;
            color: #5f6368;
            display: inline;
        }
        .text {
            font-family: "Google Sans", "Roboto", Helvetica;
            font-weight: 400;
            margin-left: 30px;
            margin-top: -20px;
            font-size: medium;
        }
        h2 {
            font-family: "Google Sans", "Roboto", Helvetica;
            font-weight: 1000;
            margin-left: 10px;
            margin-bottom: 30px;
        }
        .headsection {
            background-color: #f2f2f2;
            height:auto;
        }
        .home-img1 {
            width: 40px;
            height: 40px;
            position: relative;
            margin-left: 10px;
            margin-top: 10px;
            margin-bottom: -10px;
        }
        .filebutton {
            margin-left: 30px;
        }


    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script charset="utf-8">
        unzip();
        document.getElementById('csvFile').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const textDecoder = new TextDecoder('shift_jis'); // гӮЁгғігӮігғјгғҮгӮЈгғігӮ°гӮ’ Shift_JIS гҒ«жҢҮе®ҡ
                    const text = textDecoder.decode(e.target.result);
                    const json = csvToJson(text);
                    
                    // JSONеӨүжҸӣзөҗжһңгӮ’иЎЁзӨә
                    const output_file = JSON.stringify(json, null, 2);
                    console.log(output_file);
                    uploadFile(output_file);
                };
                reader.readAsArrayBuffer(file); // readAsArrayBufferгҒ«еӨүжӣҙ
            }
        });

        function csvToJson(csv) {
            const linestest = csv.split(/\n/);
            const result = [];
            const conversion_dict = {"зҸҫд»ЈгҒ®":"зҸҫеӣҪ",
                       "иЁҖиӘһж–Ү":"иЁҖж–Ү",
                       "и«–зҗҶеӣҪ":"и«–еӣҪ",
                       "еҸӨе…ё":"еҸӨе…ё",
                        "е®ҹж•°A":"е®ҹж•°A",
                        "е®ҹж•°B":"е®ҹж•°B",
                        "зҗҶж•°E":"зҗҶж•°E",
                        "ж•°еӯҰв… ":"ж•°в… ",
                        "ж•°в… в…Ў":"ж•°в… ",
                        "ж•°еӯҰпјЎ":"ж•°A",
                        "ж•°пјЎ":"ж•°A",
                        "зҗҶж•°в…ЎОұ":"зҗҶж•°в…ЎОұ",
                        "зҗҶж•°в…ЎОІ":"зҗҶж•°в…ЎОІ",
                        "зҗҶж•°в…Ў":"зҗҶж•°в…Ў",
                        "зҗҶж•°ж•°":"зҗҶж•°в… ",
                        "ж•°еӯҰв…ў":"ж•°в…ў",
                        "ж•°еӯҰв…Ў":"ж•°в…Ў",
                        "ж•°еӯҰпјў":"ж•°B",
                        "еҝңж•°":"еҝңж•°",
                        "EW":"EW",
                        "пҪҙпҪҜпҪҫпҪІ":"EW",
                        "и«–зҗҶ":"и«–иЎЁ",
                        "и«–иЎЁ":"и«–иЎЁ",
                        "иӢұиӘһгӮі":"EC",
                        "EC":"EC",
                        "Cв…ў":"EC",
                        "з·ҸеҗҲиӢұ":"з·ҸиӢұ",
                        "ж—Ҙең°":"ж—Ҙең°",
                        "ең°жӯҙ":"ең°жӯҙОІ",
                        "дё–ж”ҝзөҢ":"дё–ж”ҝзөҢ",
                        "жӯҙеҸІ":"жӯҙеҸІ",
                        "ең°зҗҶ":"ең°зҗҶ",
                        "дё–з•ҢеҸІ":"дё–еҸІ",
                        "зү©зҗҶеҹә":"зү©еҹә",
                        "з”ҹзү©еҹә":"з”ҹеҹә",
                        "еҢ–еӯҰеҹә":"еҢ–еҹә",
                        "зҗҶзү©з”ҹ":"зҗҶзү©з”ҹ",
                        "зү©з”ҹ":"зү©з”ҹ",
                        "зҗҶеҢ–":"зҗҶеҢ–",
                        "зҗҶж•°зү©":"зҗҶзү©",
                        "зҗҶж•°з”ҹ":"зҗҶз”ҹ",
                        "зҗҶж•°еҢ–":"зҗҶеҢ–",
                        "еҢ–":"еҢ–еӯҰ",
                        "иҮӘз„¶з§‘":"иҮӘз§‘",
                        "жғ…е ұ":"жғ…е ұв… ",
                        "дҪ“":"дҪ“",
                        "дҝқеҒҘ":"дҝқ",
                        "е®¶еәӯеҹә":"е®¶",
                        "иҠё":"иҠё",
                        "зҗҶж•°жҺўз©¶":"зҗҶж•°жҺўз©¶",
                        "еӣҪйҡӣжҺўз©¶":"еӣҪйҡӣжҺўз©¶",
                        "з·ҸеҗҲ":"з·ҸеҗҲ",
                        "е…¬е…ұ":"е…¬е…ұ",
                        "пҫғпҫһпҪІпҫҚ":"DDI",
                        "пј¬пјЁпјІ":"LHR"
            }

            for (let i = 1; i < linestest.length; i++){
                const obj = {};
                const currentline = linestest[i].split(/,/);
                
                let a = [];
                
                for (let j = 1; j < currentline.length; j++) {
                    if (currentline[j] != "\r"){
                        a.push(currentline[j])
                    }
                }
                obj["class"] = currentline[0];
                obj["null"] = a;
                result.push(obj);
            }

            for (let i = 0; i < result.length; i++){
                for (let j = 0; j < result[i]["null"].length; j++){
                    for (let k in conversion_dict) {
                        if (result[i]['null'][j].includes(k)) {
                            result[i]['null'][j] = " " + conversion_dict[k];
                            break;
                        }
                    }
                }
            }
            return result;
        }

        function uploadFile(inputfile) {
            const file = new Blob([inputfile], { type: 'application/json'});
            const repo = 'Scheduler_data'; //your-repo-name
            const owner = 'Wataru532'; //your-github-username
            const branch = 'main';
            const token = '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'; //your-personal-access-token
            const filePath = 'scheduler_data.json';

            const reader = new FileReader();
            reader.onload = async function(event) {
                const content = btoa(event.target.result);

                const url = `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`;

                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Add ${filePath}`,
                        content: content,
                        branch: branch
                    })
                });

                if (response.ok) {
                    alert('гғ•гӮЎгӮӨгғ«гҒ®гӮўгғғгғ—гғӯгғјгғүгҒҢе®ҢдәҶгҒ—гҒҫгҒ—гҒҹгҖӮгғҡгғјгӮёгӮ’й–үгҒҳгҒҰгӮӮж§ӢгҒ„гҒҫгҒӣгӮ“гҖӮ');
                } else {
                    const error = await response.json();
                    alert(`Error: ${error.message}`);
                }
            };
            reader.readAsBinaryString(file);
        }

        function unzip(){
            fetch('https://Wataru532.github.io/Scheduler_data/t_k.json')
            .then(function(response) {
              if (!response.ok) {
                throw new Error('Failed to load JSON file: ' + response.statusText);
              }
              return response.json();
            })
            .then(function(data) {
              const jsonData = data;
              console.log(jsonData);
            })
        }
    </script>
</body>
</html>
